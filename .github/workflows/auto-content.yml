name: 自动生成西藏旅游内容

on:
  schedule:
    - cron: '0 0 * * 0'   # 每天 00:00 UTC（北京时间早上8点）
  workflow_dispatch:       # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install openai dotenv
      - name: 生成旅游线路
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-tour.js
      - name: 生成博客文章
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-blog.js
      - name: 提交并推送新内容
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add src/content/
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动生成新内容" && git push)
